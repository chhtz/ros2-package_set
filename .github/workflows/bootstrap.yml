name: bootstrap CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    # - uses: actions/checkout@v4  ## no need to checkout, this is done by autoproj_bootstrap
    - name: Install dependencies
      run: |
        sudo apt-get -y update && sudo apt-get -y install wget ruby-dev ssh git sudo build-essential libunwind-dev ccache
        git config --global user.name "GitHub runner" && git config --global user.email "runner@github.com"
      shell: bash
    - name: bootstrap_buildconf
      run: |
        wget https://rock-robotics.org/autoproj_bootstrap
        ruby autoproj_bootstrap --no-interactive git https://github.com/dfki-ric/ros2-buildconf
        # Check out packageset and configure variables
        . env.sh && aup --config --no-interactive
    - name: Checkout branch of packageset
      if: ${{ github.event_name == 'pull_request' }}
      run: | 
        cd autoproj/remotes/ros2
        git config pull.rebase false
        git remote add PR ${{ github.server_url }}/${{github.repository }}
        git pull -X theirs PR ${{ github.ref }}
    - name: update
      run: |
        source env.sh && autoproj update --no-interactive

    - name: Restore ccache
      id: ccache-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-ccache-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Configure ccache
      run: |
          ccache --max-size=2000M
          ccache --set-config=compression=true

    - name: Build
      run: |
          source /opt/ros/*/setup.bash
          colcon build --cmake-args "-DCMAKE_C_COMPILER_LAUNCHER=ccache" "-DCMAKE_CXX_COMPILER_LAUNCHER=ccache" "-DCMAKE_BUILD_TYPE=Release"

    - name: Show ccache stats
      if: always()
      run: ccache -sv
    - name: Save ccache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ steps.ccache-restore.outputs.cache-primary-key }}
